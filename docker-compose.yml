services:
  influxdb:
    image: influxdb:latest
    container_name: monitoreo-influx-db
    ports:
      - "8086:8086"
    # NOTA: Para un inicio totalmente "desde cero", borrar la carpeta ./docker-data
    volumes:
      - ./docker-data/influxdb:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password_segura_cambiame
      - DOCKER_INFLUXDB_INIT_ORG=MI_ORG
      - DOCKER_INFLUXDB_INIT_BUCKET=oracle_metrics
      # El token se configura automáticamente al inicio
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my_super_secret_default_token_123
    restart: unless-stopped
    networks:
      - monitoreo-net

  postgres_oracle:
    image: postgres:15-alpine
    container_name: monitoreo-postgres-db
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=oracle_user
      - POSTGRES_PASSWORD=oracle_pass
      - POSTGRES_DB=oracle_config
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - monitoreo-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitoreo-backend
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=monitoreo-postgres-db
      - DB_PORT=5432
      - DB_USERNAME=oracle_user
      - DB_PASSWORD=oracle_pass
      - DB_NAME=oracle_config
    depends_on:
      - postgres_oracle
      - influxdb
    restart: unless-stopped
    networks:
      - monitoreo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api
    container_name: monitoreo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - monitoreo-net

networks:
  monitoreo-net:
    driver: bridge